name: Optimize Author Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp in temp folder
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp

      - name: Resize all images
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import { readdirSync, existsSync } from 'fs';

          const folders = [
            // Authors: 25x25 display → 50x50 optimal (2x retina)
            { dir: 'public/images/authors', width: 50, height: 50, lossless: false, quality: 90 },
            // Slider: 882x331 display → 900x338 optimal
            { dir: 'public/images/slider', width: 900, height: 338, lossless: false, quality: 90 },
            // Posts: optimize existing JPGs
            { dir: 'public/images/posts', width: 750, height: 500, lossless: false, quality: 85 },
          ];

          for (const { dir, width, height, lossless, quality } of folders) {
            if (!existsSync(dir)) continue;
            for (const file of readdirSync(dir)) {
              if (/\.(jpg|jpeg|png)$/i.test(file)) {
                const input = dir + '/' + file;
                const out = dir + '/' + file.replace(/\.[^.]+$/, '.webp');
                await sharp(input)
                  .resize(width, height, {
                    fit: 'cover',
                    kernel: sharp.kernel.lanczos3,
                    withoutEnlargement: true,
                  })
                  .webp({ quality, effort: 6 })
                  .toFile(out);
                console.log('Done:', input, '->', out);
              }
            }
          }

          // Logo separate — maintain aspect ratio
          if (existsSync('public/images/logo.png')) {
            await sharp('public/images/logo.png')
              .resize(300, null, {
                kernel: sharp.kernel.lanczos3,
                withoutEnlargement: true,
              })
              .webp({ quality: 90, effort: 6 })
              .toFile('public/images/logo.webp');
            console.log('Done: logo.png -> logo.webp');
          }
          EOF

      - name: Commit optimized images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/images/authors/*.webp || true
          git add public/images/slider/*.webp || true
          git add public/images/posts/*.webp || true
          git add public/images/logo.webp || true
          git diff --staged --quiet || git commit -m "Auto: optimize all images with correct display sizes"
          git push
