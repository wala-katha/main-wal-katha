name: Optimize All Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp in temp folder
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp

      - name: Optimize all images
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import { readdirSync, existsSync } from 'fs';

          const folders = [
            { dir: 'public/images/authors', width: 50, height: 50 },
            { dir: 'public/images/slider', width: 900, height: 338 },
            { dir: 'public/images/posts', width: 750, height: 500 },
          ];

          for (const { dir, width, height } of folders) {
            if (!existsSync(dir)) continue;
            for (const file of readdirSync(dir)) {
              if (/\.(jpg|jpeg|png)$/i.test(file)) {
                const input = dir + '/' + file;
                const out = dir + '/' + file.replace(/\.[^.]+$/, '.webp');
                await sharp(input)
                  .resize(width, height, {
                    fit: 'cover',
                    kernel: sharp.kernel.lanczos3,
                    withoutEnlargement: true,
                  })
                  .sharpen({
                    sigma: 1.2,
                    m1: 1.5,
                    m2: 0.7,
                    x1: 2.0,
                    y2: 10.0,
                    y3: 20.0,
                  })
                  .webp({ quality: 100, lossless: true, effort: 6 })
                  .toFile(out);
                console.log('Done:', input, '->', out);
              }
            }
          }

          if (existsSync('public/images/logo.png')) {
            await sharp('public/images/logo.png')
              .resize(300, 50, {
                fit: 'contain',
                background: { r: 0, g: 0, b: 0, alpha: 0 },
                kernel: sharp.kernel.lanczos3,
              })
              .sharpen({ sigma: 0.8 })
              .webp({ quality: 100, lossless: true, effort: 6 })
              .toFile('public/images/logo.webp');
            console.log('Done: logo.png -> logo.webp');
          }
          EOF

      - name: Commit optimized images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/images/authors/*.webp || true
          git add public/images/slider/*.webp || true
          git add public/images/posts/*.webp || true
          git add public/images/logo.webp || true
          git add public/images/favicon/*.webp || true
          git diff --staged --quiet || git commit -m "Auto: optimize images with sharpening"
          git push
